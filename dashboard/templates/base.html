<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZTForensics — {% block title %}Dashboard{% endblock %}</title>

  <!-- Bootstrap 5 (dark theme) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Custom dark cybersecurity theme -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🛡️ ZTForensics</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}"
             href="/">📊 Live Monitor</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/timeline' %}active{% endif %}"
             href="/timeline">📅 Timeline</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/verify' %}active{% endif %}"
             href="/verify">🔍 Verify Integrity</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/package' %}active{% endif %}"
             href="/package">📦 Evidence Package</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page content ───────────────────────────────────────────────────────── -->
<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<!-- ── Footer ─────────────────────────────────────────────────────────────── -->
<footer>
  ZTForensics — Zero Trust Forensic Evidence System &nbsp;|&nbsp; Semester Project 2026
</footer>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
